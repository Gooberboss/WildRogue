<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alien Tag AR Game</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 2;
    }

    #hud {
        position: fixed;
        top: 20px;
        left: 20px;
        color: #00ff88;
        font-size: 24px;
        z-index: 3;
        text-shadow: 0 0 10px #00ff88;
    }

    #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 40px;
        height: 40px;
        margin-left: -20px;
        margin-top: -20px;
        border: 2px solid #00ff88;
        border-radius: 50%;
        z-index: 3;
        pointer-events: none;
    }

    #shootBtn {
        position: fixed;
        bottom: 40px;
        right: 40px;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: none;
        background: rgba(0,255,100,0.8);
        color: black;
        font-size: 24px;
        font-weight: bold;
        z-index: 4;
    }
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<canvas id="gameCanvas"></canvas>

<div id="hud">
    Alien Tags: <span id="score">0</span>
</div>

<div id="crosshair"></div>

<button id="shootBtn">TAG</button>

<script>
const video = document.getElementById("camera");
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let effects = [];

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment"
            },
            audio: false
        });

        video.srcObject = stream;
    } catch (err) {
        alert("Camera access denied.");
    }
}

function createAlienEffect(x, y) {
    effects.push({
        x,
        y,
        radius: 10,
        alpha: 1
    });
}

function drawAlienOverlay() {
    ctx.fillStyle = "rgba(0,255,120,0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#00ff88";
    ctx.lineWidth = 3;

    for (let i = 0; i < 10; i++) {
        ctx.beginPath();
        ctx.arc(
            Math.random() * canvas.width,
            Math.random() * canvas.height,
            Math.random() * 4,
            0,
            Math.PI * 2
        );
        ctx.stroke();
    }
}

function updateEffects() {
    for (let i = effects.length - 1; i >= 0; i--) {
        const e = effects[i];

        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);

        ctx.fillStyle = `rgba(0,255,100,${e.alpha})`;
        ctx.fill();

        e.radius += 3;
        e.alpha -= 0.03;

        if (e.alpha <= 0) {
            effects.splice(i, 1);
        }
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawAlienOverlay();
    updateEffects();

    requestAnimationFrame(gameLoop);
}

document.getElementById("shootBtn").addEventListener("click", () => {
    const x = canvas.width / 2;
    const y = canvas.height / 2;

    createAlienEffect(x, y);

    score++;
    scoreEl.textContent = score;
});

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

startCamera();
gameLoop();
</script>

</body>
</html>
