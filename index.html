<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mission Valley v4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="titleScreen">
  <h1>MISSION VALLEY</h1>
  <p>Christian Missionary Farming RPG</p>
  <button id="startBtn">START GAME</button>
  <div class="version">v4</div>
</div>

<canvas id="game"></canvas>

<div id="hud">
  <div>🌾 Supplies: <span id="supplies">0</span></div>
  <div>✝ Faith: <span id="faith">0</span></div>
  <div id="message">Help the village grow.</div>
</div>

<div id="controls">
  <div class="row">
    <button id="up">▲</button>
  </div>
  <div class="row">
    <button id="left">◀</button>
    <button id="down">▼</button>
    <button id="right">▶</button>
    <button id="action">✝</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
