<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Kung Fu Legends v7</title>
<style>
html,body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
font-family:Arial,sans-serif;
}
canvas{
display:block;
width:100vw;
height:100vh;
background:#87CEEB;
}
#hud{
position:fixed;
top:10px;
left:10px;
z-index:10;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:12px;
color:white;
font-size:20px;
}
#controlsLeft{
position:fixed;
bottom:20px;
left:20px;
display:flex;
gap:10px;
z-index:20;
}
#controlsRight{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:10px;
z-index:20;
}
button{
width:75px;
height:75px;
border:none;
border-radius:50%;
font-size:30px;
background:rgba(255,255,255,0.85);
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
<div>❤️ <span id="hp">100</span></div>
<div>🏆 <span id="score">0</span></div>
<div style="font-size:12px;">Kung Fu Legends v7</div>
</div>

<div id="controlsLeft">
<button id="left">◀</button>
<button id="right">▶</button>
</div>

<div id="controlsRight">
<button id="jump">⬆</button>
<button id="punch">拳</button>
<button id="kick">🦶</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const player={
x:150,
y:0,
vx:0,
vy:0,
dir:1,
jumping:false,
attack:"",
hp:100
};

const gravity=0.8;

function ground(){
return canvas.height-140;
}

player.y=ground();

let score=0;
let cameraX=0;

const enemies=[];

for(let i=0;i<12;i++){
enemies.push({
x:700+i*250,
y:ground(),
alive:true
});
}

const keys={left:false,right:false};

function hit(range,points){
for(const e of enemies){

if(!e.alive) continue;

const dx=Math.abs(e.x-player.x);
const dy=Math.abs(e.y-player.y);

if(dx<range && dy<80){
e.alive=false;
score+=points;
}
}
}

function update(){

player.vx=0;

if(keys.left){
player.vx=-6;
player.dir=-1;
}

if(keys.right){
player.vx=6;
player.dir=1;
}

if(player.attack==="jumpkick"){
player.vx+=player.dir*4;
}

player.x+=player.vx;

player.vy+=gravity;
player.y+=player.vy;

if(player.y>ground()){
player.y=ground();
player.vy=0;
player.jumping=false;
}

cameraX=player.x-120;

for(const e of enemies){

if(!e.alive) continue;

if(Math.abs(e.x-player.x)<40){
player.hp-=0.03;
}
}

document.getElementById("hp").textContent=Math.floor(player.hp);
document.getElementById("score").textContent=score;
}

function drawBackground(){

const sky=ctx.createLinearGradient(0,0,0,canvas.height);
sky.addColorStop(0,"#6ec6ff");
sky.addColorStop(1,"#dff6ff");

ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<20;i++){

const x=(i*300)-(cameraX*0.3%300);

ctx.fillStyle="#888";
ctx.fillRect(x,ground()-120,70,120);

ctx.beginPath();
ctx.arc(x+35,ground()-140,65,0,Math.PI*2);
ctx.fillStyle="#66cc77";
ctx.fill();
}

ctx.fillStyle="#4CAF50";
ctx.fillRect(0,ground()+45,canvas.width,120);
}

function drawPlayer(){

ctx.save();

ctx.translate(player.x-cameraX,player.y);
ctx.scale(player.dir,1);

ctx.fillStyle="#111";
ctx.fillRect(-15,0,30,50);

ctx.fillStyle="#cc2222";
ctx.fillRect(-20,5,40,18);

ctx.beginPath();
ctx.arc(0,-20,18,0,Math.PI*2);
ctx.fillStyle="#f2c28b";
ctx.fill();

ctx.strokeStyle="#FFD700";
ctx.lineWidth=7;

if(player.attack==="punch"){
ctx.beginPath();
ctx.moveTo(15,10);
ctx.lineTo(55,0);
ctx.stroke();
}

if(player.attack==="kick"){
ctx.beginPath();
ctx.moveTo(0,35);
ctx.lineTo(60,20);
ctx.stroke();
}

if(player.attack==="jumpkick"){
ctx.beginPath();
ctx.moveTo(-5,15);
ctx.lineTo(75,-10);
ctx.stroke();
}

ctx.restore();
}

function drawEnemies(){

for(const e of enemies){

if(!e.alive) continue;

ctx.save();

ctx.translate(e.x-cameraX,e.y);

ctx.fillStyle="#7B1FA2";
ctx.fillRect(-15,0,30,50);

ctx.beginPath();
ctx.arc(0,-18,16,0,Math.PI*2);
ctx.fillStyle="#f2c28b";
ctx.fill();

ctx.restore();
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawBackground();
drawEnemies();
drawPlayer();

if(player.hp<=0){

ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="48px Arial";
ctx.fillText("GAME OVER",canvas.width/2-150,canvas.height/2);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

function bindHold(id,key){

const btn=document.getElementById(id);

btn.addEventListener("touchstart",e=>{
e.preventDefault();
keys[key]=true;
});

btn.addEventListener("touchend",e=>{
e.preventDefault();
keys[key]=false;
});
}

bindHold("left","left");
bindHold("right","right");

document.getElementById("jump").addEventListener("touchstart",e=>{
e.preventDefault();

if(!player.jumping){
player.vy=-16;
player.jumping=true;
}
});

function doAttack(type){

player.attack=type;

if(type==="punch") hit(70,100);
if(type==="kick") hit(100,150);
if(type==="jumpkick") hit(130,250);

setTimeout(()=>{
player.attack="";
},220);
}

document.getElementById("punch").addEventListener("touchstart",e=>{
e.preventDefault();
doAttack("punch");
});

document.getElementById("kick").addEventListener("touchstart",e=>{
e.preventDefault();

if(player.jumping){
doAttack("jumpkick");
}else{
doAttack("kick");
}
});
</script>

</body>
</html>
