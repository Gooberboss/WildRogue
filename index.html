<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Kung Fu Legends v10</title>
<style>
html,body{
margin:0;
overflow:hidden;
background:#000;
touch-action:none;
font-family:Arial,sans-serif;
}
canvas{
display:block;
width:100vw;
height:100vh;
}

#hud{
position:fixed;
top:10px;
left:10px;
z-index:20;
padding:12px;
border-radius:14px;
background:rgba(0,0,0,0.4);
color:white;
backdrop-filter:blur(6px);
}

#movePad{
position:fixed;
left:18px;
bottom:18px;
width:170px;
height:170px;
border-radius:50%;
background:rgba(255,255,255,0.08);
z-index:20;
}

#stick{
position:absolute;
left:55px;
top:55px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.85);
}

#actions{
position:fixed;
right:18px;
bottom:18px;
display:flex;
flex-direction:column;
gap:12px;
z-index:20;
}

.row{
display:flex;
gap:12px;
justify-content:flex-end;
}

button{
width:84px;
height:84px;
border:none;
border-radius:50%;
font-size:30px;
background:rgba(255,255,255,0.82);
box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

.small{
font-size:12px;
opacity:0.7;
margin-top:4px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
<div>❤️ <span id="hp">100</span></div>
<div>🏆 <span id="score">0</span></div>
<div>🔥 Combo: <span id="combo">0</span></div>
<div class="small">Kung Fu Legends v10</div>
</div>

<div id="movePad"><div id="stick"></div></div>

<div id="actions">
<div class="row">
<button id="jump">⬆</button>
</div>
<div class="row">
<button id="punch">拳</button>
<button id="kick">🦶</button>
</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

function ground(){
return canvas.height-260;
}

const gravity=0.8;

const player={
x:150,
y:ground(),
vx:0,
vy:0,
dir:1,
jumping:false,
attack:"",
hp:100,
flash:0
};

let moveInput=0;
let score=0;
let combo=0;
let cameraX=0;
let shake=0;

const particles=[];

const enemies=[];

for(let i=0;i<24;i++){
enemies.push({
x:700+i*220,
y:ground(),
alive:true,
hp:2,
attackTimer:0
});
}

function spawnParticles(x,y,color){
for(let i=0;i<10;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:25,
color
});
}
}

function hit(range,damage){

for(const e of enemies){

if(!e.alive) continue;

const dx=Math.abs(e.x-player.x);
const dy=Math.abs(e.y-player.y);

if(dx<range && dy<90){

e.hp-=damage;

spawnParticles(e.x-cameraX,e.y-40,"#FFD700");

shake=8;

combo++;

if(e.hp<=0){
e.alive=false;
score+=100*combo;
}

}
}
}

function update(){

player.vx=moveInput*7;

if(moveInput>0.1) player.dir=1;
if(moveInput<-0.1) player.dir=-1;

if(player.attack==="jumpkick"){
player.vx+=player.dir*6;
}

player.x+=player.vx;

player.vy+=gravity;
player.y+=player.vy;

if(player.y>ground()){
player.y=ground();
player.vy=0;
player.jumping=false;
}

cameraX+=(player.x-cameraX-140)*0.08;

for(const e of enemies){

if(!e.alive) continue;

const dist=e.x-player.x;

if(Math.abs(dist)<42){
player.hp-=0.05;
player.flash=2;
}
}

for(const p of particles){
p.x+=p.vx;
p.y+=p.vy;
p.life--;
}

while(particles.length && particles[0].life<=0){
particles.shift();
}

if(shake>0) shake--;

if(player.flash>0) player.flash--;

document.getElementById("hp").textContent=Math.floor(player.hp);
document.getElementById("score").textContent=score;
document.getElementById("combo").textContent=combo;
}

function drawBackground(){

const sky=ctx.createLinearGradient(0,0,0,canvas.height);
sky.addColorStop(0,"#4aa3ff");
sky.addColorStop(1,"#dff6ff");

ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<20;i++){

const x=(i*320)-(cameraX*0.18%320);

ctx.fillStyle="#5e6d7a";
ctx.fillRect(x,ground()-180,100,180);

ctx.fillStyle="#2ecc71";
ctx.beginPath();
ctx.arc(x+50,ground()-200,85,0,Math.PI*2);
ctx.fill();
}

ctx.fillStyle="#3fa34d";
ctx.fillRect(0,ground()+55,canvas.width,220);
}

function drawPlayer(){

ctx.save();

ctx.translate(player.x-cameraX+(Math.random()-0.5)*shake,player.y);
ctx.scale(player.dir,1);

ctx.shadowBlur=18;
ctx.shadowColor="rgba(0,0,0,0.35)";

ctx.fillStyle=player.flash>0?"#ffffff":"#111";
ctx.fillRect(-18,0,36,56);

ctx.fillStyle="#d62828";
ctx.fillRect(-22,5,44,18);

ctx.beginPath();
ctx.arc(0,-22,20,0,Math.PI*2);
ctx.fillStyle="#f2c28b";
ctx.fill();

ctx.strokeStyle="#FFD700";
ctx.lineWidth=8;

if(player.attack==="punch"){
ctx.beginPath();
ctx.moveTo(15,10);
ctx.lineTo(62,-4);
ctx.stroke();
}

if(player.attack==="kick"){
ctx.beginPath();
ctx.moveTo(0,38);
ctx.lineTo(70,18);
ctx.stroke();
}

if(player.attack==="jumpkick"){
ctx.beginPath();
ctx.moveTo(-5,14);
ctx.lineTo(84,-15);
ctx.stroke();
}

ctx.restore();
}

function drawEnemies(){

for(const e of enemies){

if(!e.alive) continue;

ctx.save();

ctx.translate(e.x-cameraX,e.y);

ctx.shadowBlur=12;

ctx.fillStyle="#6a0dad";
ctx.fillRect(-18,0,36,56);

ctx.fillStyle="#222";
ctx.fillRect(-20,5,40,14);

ctx.beginPath();
ctx.arc(0,-22,19,0,Math.PI*2);
ctx.fillStyle="#f2c28b";
ctx.fill();

ctx.restore();
}
}

function drawParticles(){

for(const p of particles){

ctx.globalAlpha=p.life/25;

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,6,6);

ctx.globalAlpha=1;
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawBackground();
drawEnemies();
drawPlayer();
drawParticles();

if(player.hp<=0){

ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="52px Arial";
ctx.fillText("GAME OVER",canvas.width/2-180,canvas.height/2);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// JOYSTICK
const pad=document.getElementById("movePad");
const stick=document.getElementById("stick");

let active=false;

function moveStick(x,y){

const rect=pad.getBoundingClientRect();

const cx=rect.left+85;
const cy=rect.top+85;

let dx=x-cx;
let dy=y-cy;

const dist=Math.sqrt(dx*dx+dy*dy);
const max=45;

if(dist>max){
dx=(dx/dist)*max;
dy=(dy/dist)*max;
}

stick.style.transform=`translate(${dx}px,${dy}px)`;

moveInput=dx/max;
}

pad.addEventListener("touchstart",e=>{
active=true;
moveStick(e.touches[0].clientX,e.touches[0].clientY);
});

document.addEventListener("touchmove",e=>{
if(!active) return;
moveStick(e.touches[0].clientX,e.touches[0].clientY);
});

document.addEventListener("touchend",()=>{
active=false;
moveInput=0;
stick.style.transform="translate(0px,0px)";
});

function doAttack(type){

player.attack=type;

if(type==="punch") hit(80,1);
if(type==="kick") hit(120,2);
if(type==="jumpkick") hit(150,3);

setTimeout(()=>{
player.attack="";
},220);
}

document.getElementById("jump").addEventListener("touchstart",e=>{
e.preventDefault();

if(!player.jumping){
player.vy=-18;
player.jumping=true;
}
});

document.getElementById("punch").addEventListener("touchstart",e=>{
e.preventDefault();
doAttack("punch");
});

document.getElementById("kick").addEventListener("touchstart",e=>{
e.preventDefault();

if(player.jumping){
doAttack("jumpkick");
}else{
doAttack("kick");
}
});
</script>

</body>
</html>
